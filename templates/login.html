<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroLab Analytics | Terminal Identification</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #050a18;
            --cyan-neon: #00f2ff;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --cyan-hover: rgba(0, 242, 255, 0.1);
        }

        body {
            margin: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* FONDO SIN BLOQUEO */
        #canvas-net {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            opacity: 0.25;
            pointer-events: none; 
        }

        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 40px;
            position: relative;
            z-index: 1000;
        }

        .back-button {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(0, 242, 255, 0.15);
            border-radius: 4px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.7rem;
            font-weight: 700;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .back-button:hover {
            color: var(--cyan-neon);
            border-color: var(--cyan-neon);
            background: var(--cyan-hover);
        }

        /* --- SELECTOR DE IDIOMAS (REPARADO Y FUNCIONAL) --- */
        .language-selector {
            position: relative;
            display: inline-block;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 242, 255, 0.2);
            color: var(--text-main);
            padding: 10px 16px;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        /* El "Puente Invisible" para que no se cierre el menú */
        .language-selector::after {
            content: "";
            position: absolute;
            top: 100%;
            right: 0;
            width: 100%;
            height: 15px; /* Cubre el hueco vacío */
            background: transparent;
        }

        .lang-dropdown {
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            background: #0a1931;
            border: 1px solid var(--cyan-neon);
            border-radius: 4px;
            min-width: 160px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .language-selector:hover .lang-dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .lang-option {
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: 0.2s;
        }

        .lang-option:hover {
            background: var(--cyan-hover);
            color: var(--cyan-neon);
        }

        /* FUERZA EL CENTRADO TOTAL */
.login-container {
    position: fixed; /* Cambiado de relative a fixed */
    top: 45%;
    left: 50%;
    transform: translate(-50%, -45%); /* Sube la tarjeta un 5% extra para balance visual */
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

        .login-card {
    background: rgba(10, 25, 49, 0.92);
    backdrop-filter: blur(25px);
    padding: 60px 50px; /* Más aire interno */
    border-radius: 4px;
    border: 1px solid rgba(0, 242, 255, 0.15);
    width: 420px;
    text-align: center;
    box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
    position: relative;
}

        /* EFECTO NUEVO SUTIL: Barrido de datos en el borde */
        .login-card::after {
            content: "";
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(
                from 180deg at 50% 50%,
                transparent 0%,
                rgba(0, 242, 255, 0.1) 10%,
                transparent 20%
            );
            animation: rotate-scan 6s linear infinite;
            z-index: -1;
        }

        @keyframes rotate-scan {
            100% { transform: rotate(360deg); }
        }

        /* EFECTO PULSO BASE (Sutil) */
        .card-pulse {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: 1px solid rgba(0, 242, 255, 0.1);
            border-radius: 4px;
            animation: border-pulse 4s infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes border-pulse {
            0% { border-color: rgba(0, 242, 255, 0.1); box-shadow: 0 0 20px rgba(0,0,0,0.5); }
            100% { border-color: rgba(0, 242, 255, 0.3); box-shadow: 0 0 30px rgba(0, 242, 255, 0.05); }
        }

        /* LOGO MÁS GRANDE */
        .login-logo {
            height: 120px; /* Duplicado de 75px a 150px, ajustado a 120px para equilibrio */
            width: auto;
            margin-bottom: 35px;
            filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.3));
        }

        .login-card h2 {
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 35px;
            letter-spacing: 2.5px;
            color: var(--text-main);
            text-transform: uppercase;
            position: relative;
            z-index: 1;
        }

        .neon-text { color: var(--cyan-neon); }

        .form-content {
            position: relative;
            z-index: 1;
        }

        .input-group { margin-bottom: 25px; text-align: left; }

        .input-group label {
            display: block;
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            color: white;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        /* EFECTO NUEVO: Brillo intenso al hacer foco */
        .input-group input:focus {
            border-color: var(--cyan-neon);
            background: rgba(0, 242, 255, 0.02);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.15);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: var(--cyan-neon);
            color: var(--bg-dark);
            border: none;
            border-radius: 4px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.85rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .btn-login:hover {
            filter: brightness(1.2);
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.4);
        }

        .login-footer {
            margin-top: 45px;
            font-size: 0.6rem;
            color: var(--text-muted);
            opacity: 0.4;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <canvas id="canvas-net"></canvas>

    <header class="top-header">
        <a href="/" class="back-button">
            <i class="fas fa-arrow-left"></i>
            <span>{{ textos.get('back', 'VOLVER') }}</span>
        </a>

        <div class="language-selector">
            <div class="lang-btn">
                <i class="fas fa-globe"></i>
                <span>{{ session.get('language', 'español').upper() }}</span>
                <i class="fas fa-chevron-down"></i>
            </div>
            <div class="lang-dropdown">
                <a href="/set_language/english" class="lang-option">🇺🇸 ENGLISH</a>
                <a href="/set_language/español" class="lang-option">🇲🇽 ESPAÑOL</a>
                <a href="/set_language/français" class="lang-option">🇫🇷 FRANÇAIS</a>
                <a href="/set_language/português" class="lang-option">🇵🇹 PORTUGUÊS</a>
            </div>
        </div>
    </header>

    <div class="login-container">
        <div class="login-card">
            <div class="card-pulse"></div> <img src="{{ url_for('static', filename='img/logo_analytics.png') }}" class="login-logo">
            <h2>{{ textos.get('access', 'ACCESO PRIVADO') }}</h2>
            
            {% if error %}
                <div style="color: #ff4a4a; font-size: 0.75rem; margin-bottom: 25px; border: 1px solid #ff4a4a; padding: 10px; background: rgba(255,74,74,0.05); position: relative; z-index: 1;">
                    <i class="fas fa-lock"></i> {{ error }}
                </div>
            {% endif %}

            <div class="form-content">
                <form action="/login" method="POST">
                    <div class="input-group">
                        <label>{{ textos.get('user_label', 'USUARIO') }}</label>
                        <input type="text" name="username" placeholder="OPERATOR ID" required>
                    </div>
                    <div class="input-group">
                        <label>{{ textos.get('pass_label', 'PASSWORD') }}</label>
                        <input type="password" name="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-login">{{ textos.get('verify_btn', 'IDENTIFICAR') }}</button>
                </form>
            </div>
            
            <div class="login-footer">
    <i class="fas fa-sync-alt fa-spin" style="font-size: 8px; margin-right: 5px;"></i> 
    ESTADO: ENLACE DE DATOS ACTIVO // PROTOCOLO MACRO-SEC
</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas-net');
        const ctx = canvas.getContext('2d');
        let points = [];
        const maxPoints = 50;

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            points = [];
            for (let i = 0; i < maxPoints; i++) {
                points.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.2,
                    vy: (Math.random() - 0.5) * 0.2
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(0, 242, 255, 0.3)';
            ctx.strokeStyle = 'rgba(0, 242, 255, 0.05)';

            points.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

                ctx.beginPath();
                ctx.arc(p.x, p.y, 1, 0, Math.PI * 2);
                ctx.fill();

                for (let j = i + 1; j < points.length; j++) {
                    const p2 = points[j];
                    const dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                    if (dist < 150) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init();
        draw();
    </script>
</body>
</html>
