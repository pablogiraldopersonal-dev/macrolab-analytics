<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MLA | Control de Terminales</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #050a18; 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 40px; 
            display: flex; 
            justify-content: center; 
        }
        .admin-container { 
            width: 100%; 
            max-width: 1000px; 
            background: rgba(16, 35, 66, 0.8); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(0, 242, 255, 0.3); 
            border-radius: 1.5rem; 
            padding: 3rem; 
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }
        h2 { 
            color: white; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .neon-text { text-shadow: 0 0 10px #00f2ff; color: #00f2ff; }
        
        .user-table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 20px; 
        }
        th { 
            text-align: left; 
            color: rgba(0, 242, 255, 0.7); 
            font-size: 0.8rem; 
            text-transform: uppercase; 
            padding: 15px; 
            border-bottom: 2px solid rgba(0, 242, 255, 0.1);
        }
        td { 
            padding: 15px; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
            font-size: 0.9rem;
        }
        .status-tag { 
            padding: 4px 10px; 
            border-radius: 20px; 
            font-size: 0.7rem; 
            font-weight: bold; 
            text-transform: uppercase;
        }
        .status-activo { background: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid #4ade80; }
        .status-off { background: rgba(255, 255, 255, 0.1); color: #94a3b8; }

        .btn-delete { 
            color: #ff4444; 
            text-decoration: none; 
            font-size: 0.8rem; 
            border: 1px solid #ff444433; 
            padding: 5px 12px; 
            border-radius: 5px; 
            transition: 0.3s;
        }
        .btn-delete:hover { background: #ff4444; color: white; }

        input { 
            background: #050a18; 
            border: 1px solid rgba(0, 242, 255, 0.2); 
            color: white; 
            padding: 8px; 
            border-radius: 8px; 
            outline: none; 
        }
        input:focus { border-color: #00f2ff; }
        
        .btn-add { 
            background: #00f2ff; 
            color: #050a18; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 8px; 
            font-weight: 800; 
            cursor: pointer; 
        }
        
        .btn-save-all {
            background: #22c55e; 
            color: white; 
            width: 100%; 
            padding: 15px; 
            font-size: 1rem; 
            cursor: pointer; 
            border-radius: 8px; 
            border: none; 
            font-weight: 800;
            margin-bottom: 25px;
            transition: 0.3s;
        }
        .btn-save-all:hover { background: #16a34a; box-shadow: 0 0 15px rgba(34, 197, 94, 0.4); }

        .back-link { 
            display: inline-block; 
            margin-top: 30px; 
            color: #94a3b8; 
            text-decoration: none; 
            font-size: 0.9rem; 
        }
        .back-link:hover { color: white; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h2><i class="fas fa-users-cog neon-text"></i> GESTIÓN DE TERMINALES</h2>

        <form action="/admin/guardar_todo" method="POST">
            <button type="submit" class="btn-save-all">
                <i class="fas fa-save"></i> GUARDAR TODOS LOS CAMBIOS DE LA TABLA
            </button>

            <table class="user-table">
                <thead>
                    <tr>
                        <th>Operador</th>
                        <th>Usuario ID</th>
                        <th>Contraseña</th>
                        <th>Estado</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody>
                    {% for user in usuarios %}
                    <tr>
                        <input type="hidden" name="id[]" value="{{ user[0] }}">
                        <td>
                            <input type="text" name="nombre[]" value="{{ user[3] }}" 
                                   style="width: 150px;"
                                   {% if user[1] == 'pablo_giraldo' %} readonly {% endif %}>
                        </td>
                        <td>
                            <input type="text" name="username[]" value="{{ user[1] }}" 
                                   style="width: 120px; color: #00f2ff;"
                                   {% if user[1] == 'pablo_giraldo' %} readonly {% endif %}>
                        </td>
                        <td>
                            <input type="text" name="password[]" value="{{ user[2] }}" 
                                   style="width: 120px;"
                                   {% if user[1] == 'pablo_giraldo' %} readonly {% endif %}>
                        </td>
                        <td>
                            {% if user[4] == 'Activo' %}
                                <span class="status-tag status-activo">ONLINE</span>
                            {% else %}
                                <span class="status-tag status-off">OFF</span>
                            {% endif %}
                        </td>
                        <td style="display: flex; gap: 8px; align-items: center;">
                            {% if user[1] != 'pablo_giraldo' %}
                                <button type="submit" title="Guardar solo este" 
                                        style="background: none; border: 1px solid #00f2ff33; color: #00f2ff; cursor: pointer; padding: 5px 10px; border-radius: 4px;">
                                    <i class="fas fa-save"></i>
                                </button>
                                
                                <a href="/admin/eliminar_usuario/{{ user[0] }}" class="btn-delete" 
                                   onclick="return confirm('¿Eliminar acceso de este operador?')">
                                    <i class="fas fa-trash"></i>
                                </a>
                            {% else %}
                                <i class="fas fa-lock" style="opacity: 0.3; color: #00f2ff;" title="Protección de Fundador"></i>
                            {% endif %}
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </form>

        <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Volver al Centro de Mando</a>
    </div>
</body>
</html>
